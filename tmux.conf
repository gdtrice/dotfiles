set -g default-terminal "tmux-256color"
set -as terminal-features "xterm-256color:RGB"

# Paint the pane backgrounds (otherwise the terminal bg shows through)
set -g window-style 'bg=#282828'
set -g window-active-style 'bg=#282828'

# Make borders and status use the same bg (no halo/edge bleed)
set -g pane-border-style 'fg=#3c3836,bg=#282828'
set -g pane-active-border-style 'fg=#fabd2f,bg=#282828'
set -g status-style 'fg=#ebdbb2,bg=#282828'
set -g message-style 'fg=#ebdbb2,bg=#282828'
set -g message-command-style 'fg=#ebdbb2,bg=#282828'
set -g mode-style 'fg=#282828,bg=#458588'
set -g display-panes-colour '#3c3836'
set -g display-panes-active-colour '#fabd2f'


set -g mouse on

# Key bindings
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
